<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder - Create Professional Resumes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        .form-section {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .preview-section {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            height: fit-content;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 2.5em;
            font-weight: 700;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .experience-entry, .education-entry, .skill-entry {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .add-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .remove-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            float: right;
        }

        .remove-btn:hover {
            background: #ff5252;
        }

        .resume-preview {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            line-height: 1.6;
        }

        .resume-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 3px solid #667eea;
        }

        .resume-name {
            font-size: 2.5em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .resume-title {
            font-size: 1.3em;
            color: #667eea;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 1.1em;
            color: #555;
        }

        .resume-section {
            margin-bottom: 30px;
        }

        .resume-section h3 {
            color: #667eea;
            font-size: 1.4em;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .resume-item {
            margin-bottom: 20px;
        }

        .resume-date {
            color: #888;
            font-size: 0.95em;
            margin-bottom: 5px;
        }

        .download-btn {
            width: 100%;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(76, 175, 80, 0.4);
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .form-section, .preview-section {
                padding: 20px;
            }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>📄 Professional Resume Builder</h1>
    
    <div class="container">
        <!-- Form Section -->
        <div class="form-section">
            <h2>📝 Fill Your Information</h2>
            
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="name" placeholder="John Doe">
            </div>

            <div class="form-group">
                <label>Job Title / Profession *</label>
                <input type="text" id="title" placeholder="Senior Software Engineer">
            </div>

            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" placeholder="john.doe@email.com">
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="phone" placeholder="+1 (555) 123-4567">
            </div>

            <div class="form-group">
                <label>LinkedIn / Portfolio</label>
                <input type="url" id="linkedin" placeholder="https://linkedin.com/in/johndoe">
            </div>

            <div class="form-group">
                <label>Summary</label>
                <textarea id="summary" rows="4" placeholder="Write a brief professional summary..."></textarea>
            </div>

            <!-- Experience Section -->
            <div class="section-header">
                <h3>💼 Work Experience</h3>
                <button class="add-btn" onclick="addExperience()">+ Add Experience</button>
            </div>
            <div id="experience-container"></div>

            <!-- Education Section -->
            <div class="section-header">
                <h3>🎓 Education</h3>
                <button class="add-btn" onclick="addEducation()">+ Add Education</button>
            </div>
            <div id="education-container"></div>

            <!-- Skills Section -->
            <div class="section-header">
                <h3>🛠️ Skills</h3>
                <button class="add-btn" onclick="addSkill()">+ Add Skill</button>
            </div>
            <div id="skills-container"></div>
        </div>

        <!-- Preview Section -->
        <div class="preview-section">
            <h2>👀 Live Preview</h2>
            <div class="resume-preview" id="resume-preview">
                <div class="resume-header">
                    <div class="resume-name" id="preview-name">John Doe</div>
                    <div class="resume-title" id="preview-title">Senior Software Engineer</div>
                    <div class="contact-info">
                        <span id="preview-email">-</span>
                        <span id="preview-phone">-</span>
                        <span id="preview-linkedin">-</span>
                    </div>
                </div>
                
                <div id="preview-summary" class="resume-section" style="display: none;">
                    <h3>Professional Summary</h3>
                    <p id="preview-summary-text">-</p>
                </div>

                <div id="preview-experience" class="resume-section" style="display: none;">
                    <h3>Work Experience</h3>
                    <div id="preview-experience-items"></div>
                </div>

                <div id="preview-education" class="resume-section" style="display: none;">
                    <h3>Education</h3>
                    <div id="preview-education-items"></div>
                </div>

                <div id="preview-skills" class="resume-section" style="display: none;">
                    <h3>Skills</h3>
                    <div id="preview-skills-items"></div>
                </div>
            </div>
            
            <button class="download-btn" onclick="downloadResume()">
                💾 Download PDF Resume
            </button>
        </div>
    </div>

    <script>
        let experienceCount = 0;
        let educationCount = 0;
        let skillsCount = 0;

        // Initialize with one entry each
        addExperience();
        addEducation();
        addSkill();

        // Real-time update function
        function updatePreview() {
            document.getElementById('preview-name').textContent = document.getElementById('name').value || 'John Doe';
            document.getElementById('preview-title').textContent = document.getElementById('title').value || 'Senior Software Engineer';
            document.getElementById('preview-email').textContent = document.getElementById('email').value || '-';
            document.getElementById('preview-phone').textContent = document.getElementById('phone').value || '-';
            document.getElementById('preview-linkedin').textContent = document.getElementById('linkedin').value || '-';

            const summary = document.getElementById('summary').value;
            const summaryPreview = document.getElementById('preview-summary');
            if (summary) {
                document.getElementById('preview-summary-text').textContent = summary;
                summaryPreview.style.display = 'block';
            } else {
                summaryPreview.style.display = 'none';
            }

            updateExperiencePreview();
            updateEducationPreview();
            updateSkillsPreview();
        }

        // Experience functions
        function addExperience() {
            experienceCount++;
            const container = document.getElementById('experience-container');
            const entry = document.createElement('div');
            entry.className = 'experience-entry';
            entry.innerHTML = `
                <button class="remove-btn" onclick="removeExperience(this)">×</button>
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" class="exp-title" placeholder="Software Engineer">
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" class="exp-company" placeholder="Tech Corp">
                </div>
                <div class="form-group">
                    <label>Dates (e.g., Jan 2020 - Present)</label>
                    <input type="text" class="exp-dates" placeholder="Jan 2020 - Present">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea class="exp-desc" rows="3" placeholder="Describe your responsibilities and achievements..."></textarea>
                </div>
            `;
            container.appendChild(entry);
            updatePreview();
        }

        function removeExperience(button) {
            button.parentElement.remove();
            updatePreview();
        }

        function updateExperiencePreview() {
            const container = document.getElementById('preview-experience-items');
            const entries = document.querySelectorAll('.experience-entry');
            container.innerHTML = '';

            if (entries.length === 0) {
                document.getElementById('preview-experience').style.display = 'none';
                return;
            }

            document.getElementById('preview-experience').style.display = 'block';

            entries.forEach(entry => {
                const title = entry.querySelector('.exp-title').value;
                const company = entry.querySelector('.exp-company').value;
                const dates = entry.querySelector('.exp-dates').value;
                const desc = entry.querySelector('.exp-desc').value;

                if (title || company) {
                    const item = document.createElement('div');
                    item.className = 'resume-item';
                    item.innerHTML = `
                        <div class="resume-date">${dates || 'Dates'}</div>
                        <strong>${title || 'Job Title'} ${company ? `@ ${company}` : ''}</strong>
                        <p>${desc || 'Description'}</p>
                    `;
                    container.appendChild(item);
                }
            });
        }

        // Education functions
        function addEducation() {
            educationCount++;
            const container = document.getElementById('education-container');
            const entry = document.createElement('div');
            entry.className = 'education-entry';
            entry.innerHTML = `
                <button class="remove-btn" onclick="removeEducation(this)">×</button>
                <div class="form-group">
                    <label>Degree</label>
                    <input type="text" class="edu-degree" placeholder="Bachelor of Science in Computer Science">
                </div>
                <div class="form-group">
                    <label>School/University</label>
                    <input type="text" class="edu-school" placeholder="University of Technology">
                </div>
                <div class="form-group">
                    <label>Dates</label>
                    <input type="text" class="edu-dates" placeholder="2016 - 2020">
                </div>
            `;
            container.appendChild(entry);
            updatePreview();
        }

        function removeEducation(button) {
            button.parentElement.remove();
            updatePreview();
        }

        function updateEducationPreview() {
            const container = document.getElementById('preview-education-items');
            const entries = document.querySelectorAll('.education-entry');
            container.innerHTML = '';

            if (entries.length === 0) {
                document.getElementById('preview-education').style.display = 'none';
                return;
            }

            document.getElementById('preview-education').style.display = 'block';

            entries.forEach(entry => {
                const degree = entry.querySelector('.edu-degree').value;
                const school = entry.querySelector('.edu-school').value;
                const dates = entry.querySelector('.edu-dates').value;

                if (degree || school) {
                    const item = document.createElement('div');
                    item.className = 'resume-item';
                    item.innerHTML = `
                        <div class="resume-date">${dates || 'Dates'}</div>
                        <strong>${degree || 'Degree'} ${school ? `• ${school}` : ''}</strong>
                    `;
                    container.appendChild(item);
                }
            });
        }

        // Skills functions
        function addSkill() {
            skillsCount++;
            const container = document.getElementById('skills-container');
            const entry = document.createElement('div');
            entry.className = 'skill-entry';
            entry.innerHTML = `
                <button class="remove-btn" onclick="removeSkill(this)">×</button>
                <div class="form-group">
                    <label>Skill</label>
                    <input type="text" class="skill-name" placeholder="JavaScript, Python, React...">
                </div>
            `;
            container.appendChild(entry);
            updatePreview();
        }

        function removeSkill(button) {
            button.parentElement.remove();
            updatePreview();
        }

        function updateSkillsPreview() {
            const container = document.getElementById('preview-skills-items');
            const entries = document.querySelectorAll('.skill-entry');
            container.innerHTML = '';

            if (entries.length === 0) {
                document.getElementById('preview-skills').style.display = 'none';
                return;
            }

            document.getElementById('preview-skills').style.display = 'block';

            const skills = Array.from(entries)
                .map(entry => entry.querySelector('.skill-name').value)
                .filter(skill => skill.trim())
                .join(' • ');

            if (skills) {
                container.innerHTML = `<p style="font-size: 1.1em;">${skills}</p>`;
            }
        }

        // Event listeners for real-time updates
        document.addEventListener('input', updatePreview);
        document.addEventListener('change', updatePreview);

        // Download PDF function
        function downloadResume() {
            const element = document.getElementById('resume-preview');
            const opt = {
                margin: 0.5,
                filename: 'resume.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
